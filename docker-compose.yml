services:
  db:
    image: mariadb:latest
    restart: always
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: p4ssw0rd
      MARIADB_ROOT_PASSWORD: Indonesia
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_network

  wordpress:
    image: wordpress:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: p4ssw0rd
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'development' );
        define( 'WP_HOME', 'https://b971-182-253-151-211.ngrok-free.app' );
        define( 'WP_SITEURL', 'https://b971-182-253-151-211.ngrok-free.app' );
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network
    depends_on:
      - db

networks:
  wp_network:
    driver: bridge

volumes:
  db_data:
  wp_data:
